<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Synexis Rep Agent</title>
  <style>
    :root {
      --fg: #111;
      --muted: #666;
      --line: #e5e7eb;
      --bg: #fff;
      --accent: #0b5fff;
      --err: #b00020;
      --chip: #f3f4f6;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px; color: var(--fg); background: var(--bg);
    }
    body { display: flex; flex-direction: column; height: 100vh; }
    header {
      padding: 12px 16px; border-bottom: 1px solid var(--line);
      display: flex; align-items: center; gap: 8px;
    }
    header h1 { font-size: 15px; font-weight: 600; margin: 0; flex: 1; }
    header button.link {
      background: none; border: 0; color: var(--muted); cursor: pointer;
      font-size: 12px; padding: 4px 6px;
    }
    header button.link:hover { color: var(--fg); }

    #settings {
      padding: 12px 16px; border-bottom: 1px solid var(--line);
      background: #fafbfc; display: none;
    }
    #settings.open { display: block; }
    #settings label {
      display: block; font-size: 12px; color: var(--muted); margin: 0 0 4px;
    }
    #settings input {
      width: 100%; padding: 6px 8px; border: 1px solid var(--line);
      border-radius: 4px; font-size: 13px; font-family: inherit;
      margin-bottom: 10px;
    }
    #settings .row { display: flex; gap: 8px; }
    #settings .row button {
      padding: 6px 10px; border: 1px solid var(--line); background: white;
      border-radius: 4px; cursor: pointer; font-size: 12px;
    }
    #settings .row button.primary {
      background: var(--accent); color: white; border-color: var(--accent);
    }
    #settings .status { font-size: 11px; color: var(--muted); margin-top: 4px; }

    main {
      flex: 1; overflow-y: auto; padding: 12px 16px;
    }
    #empty {
      color: var(--muted); font-size: 13px; text-align: center; margin-top: 40px;
    }
    #industry-picker {
      margin-top: 32px; text-align: center;
    }
    .picker-prompt {
      font-size: 14px; font-weight: 600; color: #002e6d;
      margin: 0 0 14px;
    }
    .picker-chips {
      display: flex; flex-direction: column; gap: 8px;
      align-items: stretch; max-width: 220px; margin: 0 auto;
    }
    .chip {
      padding: 9px 14px; border-radius: 20px;
      border: 1.5px solid #002e6d; background: #fff;
      color: #002e6d; font-size: 13px; font-weight: 600;
      cursor: pointer; text-align: center; transition: background 0.15s, color 0.15s;
    }
    .chip:hover { background: #002e6d; color: #fff; }
    .chip.chip-dismiss {
      border-color: var(--line); color: var(--muted); font-weight: 400;
    }
    .chip.chip-dismiss:hover { background: var(--chip); color: var(--fg); }
    .error {
      background: #fff0f0; border: 1px solid #ffc9c9; color: var(--err);
      padding: 8px 10px; border-radius: 4px; font-size: 13px;
      margin-bottom: 12px; white-space: pre-wrap;
    }
    .turn { margin-bottom: 18px; }
    .turn .q {
      width: fit-content;
      max-width: 85%;
      margin-left: auto;
      margin-bottom: 10px;
      padding: 8px 12px;
      background: #ebf8fa;
      color: #002e6d;
      border-radius: 16px 16px 4px 16px;
      font-weight: 500;
      font-size: 13px;
      line-height: 1.4;
      word-wrap: break-word;
    }
    .turn .a {
      white-space: pre-wrap; line-height: 1.45;
    }
    .turn .a h2, .turn .a h3 {
      font-size: 14px; margin: 10px 0 4px; font-weight: 600;
    }

    /* Accordion sections */
    .ans-preamble { margin-bottom: 6px; }
    .ans-expand-bar { padding: 2px 0 4px; }
    .ans-expand-all {
      background: none; border: none; padding: 0;
      font-size: 11px; color: var(--muted); cursor: pointer;
      text-decoration: underline; text-underline-offset: 2px;
    }
    .ans-expand-all:hover { color: var(--fg); }
    .ans-section { border-top: 1px solid var(--line); }
    .ans-section:last-child { border-bottom: 1px solid var(--line); }
    /* Sources accordion — styled as metadata, not a primary section */
    .ans-section-sources .ans-section-hd {
      font-weight: 400;
      color: var(--muted);
      font-size: 12px;
    }
    .ans-section-sources .ans-section-hd:hover { color: var(--fg); }
    .ans-section-hd {
      display: flex; align-items: center; gap: 7px;
      width: 100%; text-align: left; background: none; border: none;
      padding: 8px 2px; font-size: 13px; font-weight: 600;
      color: var(--fg); cursor: pointer; line-height: 1.3;
    }
    .ans-section-hd:hover { color: #1a6fc4; }
    .ans-chevron {
      font-size: 8px; flex-shrink: 0; color: var(--muted);
      transition: transform 0.15s ease; display: inline-block;
    }
    .ans-section-hd[aria-expanded="true"] .ans-chevron { transform: rotate(90deg); }
    .ans-section-body {
      padding: 2px 4px 10px 20px;
      white-space: pre-wrap; line-height: 1.45;
    }
    /* In-progress (streaming) section — visible immediately, no toggle */
    .ans-section-hd-static {
      display: flex; align-items: center; gap: 7px;
      padding: 8px 2px; font-size: 13px; font-weight: 600;
      color: var(--fg); line-height: 1.3;
    }
    .ans-section-body-live { display: block; }
    /* Blinking cursor shown at the end of the streaming section */
    @keyframes ans-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    .ans-cursor {
      display: inline-block; width: 2px; height: 0.9em;
      background: var(--muted); vertical-align: text-bottom;
      margin-left: 2px; animation: ans-blink 0.9s step-end infinite;
    }
    .turn .meta {
      color: var(--muted); font-size: 11px; margin-top: 4px;
    }
    .citations {
      margin-top: 10px; padding-top: 8px; border-top: 1px dashed var(--line);
    }
    .citations .head {
      color: var(--muted); font-size: 11px; margin-bottom: 4px;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .cite {
      font-size: 12px; padding: 4px 0;
    }
    .cite .n {
      display: inline-block; min-width: 20px; font-weight: 600;
      /* Match the inline badge color so an inline [N] and its sources-list entry
         read as the same visual citation system. */
      color: #002e6d;
    }
    .cite .path {
      word-break: break-all;
    }
    .cite .page {
      color: var(--muted); font-size: 11px;
    }

    /* Inline citation badges — Synexis brand navy, small support element, not focal point */
    .cite-badge {
      display: inline-block;
      min-width: 14px; height: 14px; line-height: 14px;
      padding: 0 4px;
      border-radius: 999px;
      background: #002e6d; color: #ebf8fa;
      font-size: 9px; font-weight: 600; font-family: inherit;
      vertical-align: super;
      margin: 0 1px;
      text-decoration: none;
      cursor: help;
      position: relative;
      user-select: none;
    }
    .cite-badge:hover, .cite-badge:focus { background: #002e6d; color: #5fd0e0; outline: none; }
    .cite-sep { font-size: 9px; color: var(--muted); margin: 0 1px; }

    .cite-tooltip {
      position: fixed;
      display: none;
      z-index: 30;
      top: 0;       /* will be overridden by JS */
      left: 0;      /* will be overridden by JS */
      width: max-content;
      /* Clamp to viewport so we don't overflow the sidebar panel when the badge
         sits near the left or right edge. The JS mouseover handler calculates
         exact coordinates and applies --arrow-offset to shift the arrow. */
      max-width: min(260px, calc(100vw - 24px));
      padding: 8px 10px;
      background: #1f2937;
      color: #f3f4f6;
      font-size: 11px; font-weight: 400; line-height: 1.4;
      text-align: left; white-space: normal;
      border-radius: 6px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.2);
    }
    .cite-tooltip::after {
      content: "";
      position: absolute;
      top: 100%;
      /* --arrow-offset is set by the JS handler so the arrow keeps pointing at the badge
         even after horizontal clamping. */
      left: calc(50% + var(--arrow-offset, 0px));
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: #1f2937;
    }
    .cite-tooltip.below::after {
      top: auto;
      bottom: 100%;
      border-top-color: transparent;
      border-bottom-color: #1f2937;
    }
    .cite-tooltip .tt-path {
      font-weight: 600; color: #fff;
      display: block; margin-bottom: 4px; word-break: break-all;
    }
    .cite-tooltip .tt-path-link {
      text-decoration: underline; text-underline-offset: 2px;
      text-decoration-color: rgba(255,255,255,0.4); cursor: pointer;
    }
    .cite-tooltip .tt-path-link:hover { color: #5fd0e0; text-decoration-color: #5fd0e0; }
    .cite-tooltip .tt-snippet { opacity: 0.9; }
    .cite-tooltip .tt-link {
      display: inline-block; margin-top: 6px;
      color: #5fd0e0; text-decoration: none; font-size: 11px; font-weight: 600;
    }
    .cite-tooltip .tt-link:hover { text-decoration: underline; }

    footer {
      border-top: 1px solid var(--line); padding: 10px 16px;
      display: flex; flex-direction: column; gap: 6px;
    }
    textarea {
      width: 100%; min-height: 56px; max-height: 160px;
      padding: 8px 10px; border: 1px solid var(--line); border-radius: 4px;
      font-size: 13px; font-family: inherit; resize: vertical;
    }
    textarea:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
    .controls { display: flex; align-items: center; gap: 8px; }
    .controls button {
      padding: 6px 14px; border: 1px solid var(--accent); background: var(--accent);
      color: white; border-radius: 4px; cursor: pointer; font-size: 13px;
      font-weight: 600;
    }
    .controls button:disabled { opacity: 0.5; cursor: not-allowed; }
    .controls .hint { color: var(--muted); font-size: 11px; flex: 1; }
    .spinner {
      display: none; width: 12px; height: 12px; border: 2px solid var(--line);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .spinner.on { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Subtle banner shown above the query input when the session exceeds
       MAX_HISTORY_TURNS and earlier turns aren't being sent to the model. */
    .trunc-note {
      font-size: 11px; color: var(--muted);
      padding: 4px 8px; margin-bottom: 4px;
      background: #fafbfc; border: 1px solid var(--line);
      border-radius: 4px; line-height: 1.3;
    }

    /* Markdown tables rendered inside answers. Tuned in Alpha after a 4-column
       Device/Coverage/Deployment/Ceiling table revealed two issues in the
       sidebar: cells line-wrapped awkwardly, and cramped columns compressed
       rather than scrolling. 12px cell font + 8px/10px padding + an always-on
       horizontal scroll wrapper fixes both. First column (Device/Component
       identifier) is nowrap + min-width so "Sentry XL" never wraps. */
    .table-wrap {
      overflow-x: auto;
      margin: 10px 0;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      background: #fff;
    }
    .table-wrap table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      line-height: 1.4;
    }
    .table-wrap th {
      background: #002e6d;
      color: #fff;
      font-weight: 600;
      text-align: left;
      padding: 8px 10px;
      border-bottom: 1px solid #e5e7eb;
    }
    .table-wrap td {
      padding: 8px 10px;
      border-bottom: 1px solid #e5e7eb;
      vertical-align: top;
    }
    .table-wrap tbody tr:nth-child(even) td { background: #f9fafb; }
    .table-wrap tbody tr:last-child td { border-bottom: 0; }
    /* First column = item identifier (Device / Component / Condition / Use case).
       Keep tight and unwrapped. */
    .table-wrap th:first-child,
    .table-wrap td:first-child {
      white-space: nowrap;
      min-width: 80px;
    }
    /* Attribute columns wrap naturally. */
    .table-wrap th:not(:first-child),
    .table-wrap td:not(:first-child) { overflow-wrap: break-word; word-break: normal; }

    /* Feedback controls per turn. Appear after the citations block. */
    .feedback {
      margin-top: 8px;
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--muted);
    }
    .feedback .fb-btn {
      background: none; border: 1px solid var(--line);
      border-radius: 4px; padding: 3px 8px;
      font-size: 13px; cursor: pointer; color: var(--muted);
    }
    .feedback .fb-btn:hover:not(:disabled) { background: #f3f4f6; color: var(--fg); }
    .feedback .fb-btn.active {
      background: #002e6d; color: #fff; border-color: #002e6d;
    }
    .feedback .fb-btn:disabled { cursor: default; opacity: 0.7; }
    /* Keep the selected rating at full saturation after submit so the rep
       can see which rating they registered. Order matters — more specific
       than the :disabled opacity rule above. */
    .feedback .fb-btn.active:disabled { opacity: 1; }
    .feedback .fb-label { flex: 1; }
    .feedback .fb-status { color: var(--muted); font-style: italic; }
    .feedback-form {
      margin-top: 6px;
      display: none; flex-direction: column; gap: 6px;
    }
    .feedback-form.open { display: flex; }
    .feedback-form textarea {
      width: 100%; min-height: 52px; max-height: 120px;
      padding: 6px 8px; border: 1px solid var(--line); border-radius: 4px;
      font-size: 12px; font-family: inherit; resize: vertical;
    }
    .feedback-form .fb-submit {
      align-self: flex-start;
      padding: 4px 10px; font-size: 12px; font-weight: 600;
      background: var(--accent); color: #fff; border: 1px solid var(--accent);
      border-radius: 4px; cursor: pointer;
    }
    .feedback-form .fb-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    /* First-launch name prompt dialog */
    dialog.name-prompt {
      border: 1px solid var(--line); border-radius: 8px;
      padding: 16px; max-width: 280px;
      font-family: inherit;
    }
    dialog.name-prompt::backdrop { background: rgba(0,0,0,0.25); }
    dialog.name-prompt h2 { font-size: 14px; margin: 0 0 4px; }
    dialog.name-prompt p { font-size: 12px; color: var(--muted); margin: 0 0 8px; }
    dialog.name-prompt input {
      width: 100%; padding: 6px 8px; border: 1px solid var(--line);
      border-radius: 4px; font-size: 13px; font-family: inherit; margin-bottom: 8px;
    }
    dialog.name-prompt .row button.primary {
      background: var(--accent); color: white; border: 1px solid var(--accent);
      padding: 6px 12px; border-radius: 4px; cursor: pointer;
      font-size: 13px; font-weight: 600;
    }
  </style>
</head>
<body>
  <header>
    <h1>Synexis Rep Agent</h1>
    <span id="statusDot" title="API status" style="width:8px;height:8px;border-radius:50%;background:#ccc;"></span>
    <button class="link" id="newConversation" title="Clear history and start a new conversation">New</button>
    <button class="link" id="toggleSettings">Settings</button>
  </header>

  <section id="settings">
    <label for="userName">Your name</label>
    <input type="text" id="userName" placeholder="e.g. Nick Buckley" autocomplete="off" />
    <label for="apiUrl">API URL</label>
    <input type="text" id="apiUrl" placeholder="https://synexis-rep-agent.onrender.com" />
    <label for="apiKey">Partner key (optional)</label>
    <input type="password" id="apiKey" placeholder="leave blank for Beta" autocomplete="off" />
    <label style="display:flex; align-items:center; gap:6px; cursor:pointer; margin-bottom:10px; font-size:12px; color:var(--muted);">
      <input type="checkbox" id="returnToSend" />
      Return sends message (Shift+Enter for new line)
    </label>
    <div class="row">
      <button id="saveSettings" class="primary">Save</button>
      <button id="testConnection">Test connection</button>
    </div>
    <div class="status" id="settingsStatus"></div>
    <div class="status">Queries are logged to help improve the agent.</div>
  </section>

  <dialog id="namePromptDialog" class="name-prompt">
    <form method="dialog">
      <h2>Enter your name</h2>
      <p>Used to identify your feedback in Beta. One-time setup.</p>
      <input type="text" id="namePromptInput" placeholder="e.g. Nick Buckley" autocomplete="off" required />
      <div class="row">
        <button id="namePromptSubmit" class="primary" value="ok">Continue</button>
      </div>
    </form>
  </dialog>

  <main>
    <div id="empty">Ask a product, efficacy, or vertical question. Answers cite the Synexis knowledge base.</div>
    <div id="industry-picker" style="display:none">
      <p class="picker-prompt">To get started, what industry are you focused on?</p>
      <div class="picker-chips">
        <button class="chip" data-industry="Healthcare">Healthcare</button>
        <button class="chip" data-industry="Animal Health">Animal Health</button>
        <button class="chip" data-industry="Food Safety">Food Safety</button>
        <button class="chip" data-industry="Higher Education">Higher Education</button>
        <button class="chip chip-dismiss" data-industry="">Other</button>
        <button class="chip chip-dismiss" data-industry="">I'm interested in everything</button>
      </div>
    </div>
    <div id="intent-picker" style="display:none">
      <p class="picker-prompt" id="intent-prompt"></p>
      <div class="picker-chips">
        <button class="chip" id="intent-overview">I'd like an overview</button>
        <button class="chip" id="intent-question">I have a specific question</button>
      </div>
    </div>
    <div id="partner-picker" style="display:none">
      <p class="picker-prompt" id="partner-prompt"></p>
      <div class="picker-chips" id="partner-chips">
        <!-- dynamically populated by sidebar.js based on partner vertical -->
      </div>
    </div>
    <div id="history"></div>
  </main>

  <footer>
    <div id="truncationNote" class="trunc-note" style="display:none;"></div>
    <textarea id="queryInput" placeholder="Ask a question…  (Cmd/Ctrl+Enter to send)"></textarea>
    <div class="controls">
      <button id="ask">Ask</button>
      <span class="spinner" id="spinner"></span>
      <span class="hint" id="hint"></span>
    </div>
  </footer>

  <script src="sidebar.js"></script>
</body>
</html>
